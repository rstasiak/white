  </symbol>

  <!-- Checkmark -->
  <symbol id="icon-checkmark" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2.5 6L5 8.5L9.5 3.5"/>
  </symbol>

